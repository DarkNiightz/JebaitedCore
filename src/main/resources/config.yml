# Core Plugin Configuration

# Ranks configuration
ranks:
  ladder:
    - owner
    - developer
    - admin
    - srmod
    - moderator
    - helper
    - vip
    - builder
    - grandmaster
    - legend
    - diamond
    - gold
    - pleb
  default: pleb

# Rank styles
rank_styles:
  owner:
    prefix: "§4§lOWNER"
    name_color: "§4"
    name_bold: true
  developer:
    prefix: "§5§lDEV"
    name_rainbow:
      enabled: true
      colors: ["4", "c", "6", "e", "2", "a", "b", "3", "1", "9", "d", "5"]
      bold_each_char: true
  admin:
    prefix: "§4§lADMIN"
    name_color: "§4"
    name_bold: true
  srmod:
    prefix: "§c§lSR.MOD"
    name_color: "§c"
    name_bold: true
  moderator:
    prefix: "§c§lMOD"
    name_color: "§c"
    name_bold: false
  helper:
    prefix: "§b§lHELPER"
    name_color: "§b"
    name_bold: false
  vip:
    prefix: "§6§lVIP"
    name_color: "§6"
    name_bold: false
  friend:
    prefix: "§d§lFRIEND"
    name_color: "§d"
    name_bold: false
  builder:
    prefix: "§9§lBUILDER"
    name_color: "§9"
    name_bold: false
  grandmaster:
    prefix: "§4§l✦GM✦"
    name_color: "§4"
    name_bold: true
  legend:
    prefix: "§d§lLEGEND"
    name_color: "§d"
    name_bold: false
  diamond:
    prefix: "§b§lDIAMOND"
    name_color: "§b"
    name_bold: false
  gold:
    prefix: "§6§lGOLD"
    name_color: "§6"
    name_bold: false
  pleb:
    prefix: "§7§lPLEB"
    name_color: "§7"
    name_bold: false

# Near command
near:
  min_rank: vip
  radius: 200

# Priority join queue — kicks the lowest-priority non-staff player when a higher-priority
# player connects to a full server. Staff ranks are always immune.
priority_queue:
  enabled: true
  # Sent to the player who is displaced when someone with a higher donor rank joins
  kicked_message: "§cYou were removed to make room for a higher-priority player joining."
  # Sent to the joining player when the server is full and nobody can be displaced
  full_message: "§cThe server is full. Purchase a donor rank at §ejebaited.net §cfor priority access."

# Messages
messages:
  prefix: "§8[§bJebaited§8] §7"
  muted: "&cYou've been muted!"
  unmuted: "&aYou've been unmuted!"
  kicked: "&cYou were kicked by staff."
  banned: "&cYou were banned by staff."
  no_permission: "§cYou don't have permission to use this command."
  hub_only_command: "§cThat command is only available in the Hub world."
  broadcast-prefix: "&9[&4GLOBAL&9] &b&l"
  staff-chat-prefix: "&b[Staff] &f"

# Logging Toggles
logging:
  enable: true
  log-joins: true
  log-chat: true
  log-moderation: true

protection:
  command_spam:
    enabled: true
    default_cooldown_ms: 250
    feedback_cooldown_ms: 1200
    heavy_cooldown_ms: 1500
    external_cooldown_ms: 5000

staff-message-color: "&b"

# Chat formatting
chat:
  enabled: true
  separator: "§7»§r"
  format: "{prefix}{styled_name} {separator} {message_colored}"
  message_color_policy:
    min_rank_aqua: helper
    aqua_code: "§b"
    default_code: "§f"

private_messages:
  color_codes:
    enabled: true
    min_rank: gold

# Moderation
moderation:
  reasons:
    - hacking
    - griefing
    - chat violation
    - being a cock
  times:
    - 30m
    - 1h
    - 1d
    - 7d
    - permanent
  clearchat:
    min_staff_rank: helper
    blank_lines: 150
    cooldown_seconds: 5

# Pets
pets:
  types:
    - dog
    - cat
    - parrot
  staff_types:
    - guardian
    - flying_dragon
  feed_item: BONE

# MOTD Settings
motd:
  enabled: true
  server-list: |
    &6Jebaited Server
    &aPlayers: {online}/{max}
  player-join:
    - "&eWelcome back, {player}!"
    - "&aYour rank: {rank}"
    - "&bOnline: {online} players"

# Auto Broadcaster
broadcaster:
  enabled: true
  interval-seconds: 300
  messages:
    - "&eTip: Don't forget to vote for rewards!"
    - "&aJoin our Discord: discord.gg/jebaited"
    - "&bServer rules: No griefing!"

