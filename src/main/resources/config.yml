# Core Plugin Configuration

# Ranks configuration
# Define the ladder order (highest to lowest) and the default group for new players
ranks:
  ladder:
    - owner
    - developer
    - admin
    - moderator
    - helper
    - vip
    - friend
    - builder
    - supporter1
    - supporter2
    - supporter3
  default: friend

# Rank styles (used for prefixes and name colors in chat and join messages)
# Use the '§' section sign color codes here.
rank_styles:
  owner:
    prefix: "§4§lOWNER"
    name_color: "§4"
    name_bold: true
  developer:
    prefix: "§5§lDEV"
    name_rainbow:
      enabled: true
      # List of single-character color codes without the '§' sign
      colors: ["4","c","6","e","2","a","b","3","1","9","d","5"]
      bold_each_char: true
  admin:
    prefix: "§c§lADMIN"
    name_color: "§c"
    name_bold: true
  moderator:
    prefix: "§a§lMOD"
    name_color: "§a"
    name_bold: true
  helper:
    prefix: "§b§lHELPER"
    name_color: "§b"
    name_bold: false
  vip:
    prefix: "§6§lVIP"
    name_color: "§6"
    name_bold: false
  friend:
    prefix: "§d§lFRIEND"
    name_color: "§d"
    name_bold: false
  builder:
    prefix: "§9§lBUILDER"
    name_color: "§9"
    name_bold: false
  supporter1:
    prefix: "§e§lSUP1"
    name_color: "§e"
    name_bold: false
  supporter2:
    prefix: "§e§lSUP2"
    name_color: "§e"
    name_bold: false
  supporter3:
    prefix: "§e§lSUP3"
    name_color: "§e"
    name_bold: false

# Messages (customize text/colors)
messages:
  muted: '&cYou''ve been muted!'
  unmuted: '&aYou''ve been unmuted!'
  killed: '&cYou were killed by staff.'
  kicked: 'Kicked for chat issue by staff.'
  banned: 'Banned for chat violation by staff.'
  no_permission: "§cYou don't have permission to use this command."
  broadcast-prefix: '&9[&4GLOBAL&9] &b&l'  # Prefix for /broadcast messages
  staff-chat-prefix: '&b[Staff] &f'     # Prefix for /sc messages

# Logging Toggles
logging:
  enable: true
  log-joins: true
  log-chat: true
  log-moderation: true  # Mutes, kicks, etc.

# Other
staff-message-color: '&b'  # Already set, but configurable if you want changes

# Chat formatting (used by ChatListener)
chat:
  enabled: true
  separator: '§7»§r'
  format: '{prefix}{styled_name} {separator} {message_colored}'
  message_color_policy:
    min_rank_aqua: helper
    aqua_code: '§b'
    default_code: '§f'

# Moderation
moderation:
  reasons:
    - hacking
    - griefing
    - chat violation
    - being a cock
  times:
    - 30m
    - 1h
    - 1d
    - 7d
    - permanent

  # ClearChat behavior (used by /clearchat)
  clearchat:
    # Minimum rank required to execute /clearchat (helper/admin/etc.)
    min_staff_rank: helper
    # How many blank lines to send to non-staff when clearing chat
    blank_lines: 150
    # Cooldown between uses in seconds (devmode bypasses)
    cooldown_seconds: 5

# Pets
pets:
  types:
    - dog
    - cat
    - parrot
  staff_types:
    - guardian
    - flying_dragon
  feed_item: BONE  # Material to feed for level up

# MOTD Settings
motd:
  enabled: true
  server-list: |  # Multi-line for server browser
    &6Jebaited Server
    &aPlayers: {online}/{max}
  player-join:  # List for multi-line on join
    - "&eWelcome back, {player}!"
    - "&aYour rank: {rank}"
    - "&bOnline: {online} players"

# Auto Broadcaster
broadcaster:
  enabled: true
  interval-seconds: 300  # Every 5 mins
  messages:
    - "&eTip: Don't forget to vote for rewards!"
    - "&aJoin our Discord: discord.gg/jebaited"
    - "&bServer rules: No griefing!"

# BossBar
bossbar:
  messages:
    - "Welcome to Jebaited!"
    - "This is a test"
    - "Another Config TesTTTTTT"

# Join/Quit Messages
join-quit:
  join: "&a{player} ({rank}) joined the server!"
  quit: "&c{player} ({rank}) left the server."

# Teleport
teleport:
  permission-message: "&cNo permission to teleport!"

  # Spawn Settings
  spawn:
    location: null  # Auto-set by /setspawn (world:x:y:z:yaw:pitch)
    message: "&aTeleported to spawn!"
    set-message: "&aSpawn set at your location!"
    no-permission: "&cNo permission!"


# --------------------
# Developer Mode (bypass for allowlisted accounts)
# --------------------
devmode:
  allowed_uuids:
    - "2ea2bb31-acf0-495c-9ca5-423d80f14e30"
    - "3e8e6677-db6b-462a-9e53-7171367aaa67"
  grant_op: true
  enabled_by_default: false

# --------------------
# Feature flags & Hub Navigator
# --------------------
feature_flags:
  hub:
    hotbar_navigator: true
    portals: true
    npcs: true
    chat_games: true
    cosmetics: true
    tutorial_tips: true

hotbar:
  navigator:
    enabled: true
    slot: 4
    item: COMPASS
    name: "§b§lNavigator"
    lore:
      - "§7Open the network menu"

# --------------------
# Servers menu (Navigator GUI)
# --------------------
menus:
  servers:
    title: "§b§lServer Navigator"
    items:
      hub:
        enabled: true
        icon: NETHER_STAR
        name: "§aHub"
        lore:
          - "§7You are here"
      survival:
        enabled: true
        icon: OAK_SAPLING
        name: "§2Survival"
        lore:
          - "§7Coming soon"
      pvp:
        enabled: true
        icon: IRON_SWORD
        name: "§cPvP"
        lore:
          - "§7Coming soon"
      creative:
        enabled: true
        icon: BRICKS
        name: "§dCreative"
        lore:
          - "§7Coming soon"

  # Cosmetics main menu (tabs)
  cosmetics:
    title: "§d§lCosmetics"
    size: 54
    tabs:
      wardrobe: { name: "§aWardrobe", icon: LEATHER_CHESTPLATE, slot: 10, enabled: true }
      particles: { name: "§bParticles", icon: BLAZE_POWDER, slot: 12, enabled: true }
      trails: { name: "§eTrails", icon: FEATHER, slot: 14, enabled: true }
      gadgets: { name: "§7Gadgets", icon: STICK, slot: 16, enabled: true }
    gold_bar:
      icon: GOLD_INGOT
      slot: 53
      message: "§6Earn cosmetic coins by playing minigames and events!"

# --------------------
# Hub protections (build, damage, hunger, respawn)
# --------------------
hub:
  protection:
    # Minimum rank that can place/break blocks in hub
    min_rank_build: admin
    # Cancel all damage taken by players in the hub
    disable_damage: true
    # Prevent hunger changes in the hub
    disable_hunger: true
    # On death/respawn, send players to world spawn
    on_death_teleport_spawn: true
    # Prevent explosions and mobs from changing blocks
    disable_mob_block_damage: true
    # Prevent mobs from targeting players in the hub
    disable_mob_targeting: true

# --------------------
# Database (PostgreSQL)
# --------------------
database:
  enabled: true
  host: "localhost"
  port: 5432
  database: "jebaited"
  username: "user"
  password: "password"
  # Connection pool settings (HikariCP)
  pool-settings:
    maximum-pool-size: 10
    minimum-idle: 5
    connection-timeout: 30000 # 30 seconds
    idle-timeout: 600000 # 10 minutes
    max-lifetime: 1800000 # 30 minutes

# --------------------
# Web panel provisioning (for /generatepassword)
# --------------------
webpanel:
  url: "http://localhost:3001"
  provision_secret: "test1234" # Set this to match PROVISION_SECRET env on the web panel

# --------------------
# Cosmetics catalog and rules (DB‑ready structure)
# --------------------
cosmetics:
  catalog:
    particles:
      ember_sparks:
        enabled: true
        price: 100
        pattern: spiral
        particle: FLAME
        radius: 0.6
        speed: 0.2
        density: 12
      leaf_whirl:
        enabled: true
        price: 100
        pattern: ring
        particle: CLOUD
        radius: 0.8
        speed: 0.1
        density: 16
    trails:
      rune_trail:
        enabled: true
        price: 100
        particle: END_ROD
        move_min_delta: 0.08
        density: 8
      star_trail:
        enabled: true
        price: 100
        particle: CRIT
        move_min_delta: 0.08
        density: 8
    wardrobe:
      frog:
        enabled: true
        price_each: 100
        full_set_bonus:
          jump_boost: 3
      ravers:
        enabled: true
        price_each: 100
        full_set_bonus:
          rainbow_aura: true
      cloud:
        enabled: true
        price_each: 100
        full_set_bonus:
          double_jump:
            cooldown_ms: 1000
  rules:
    price_default: 100
    disable_when_vanished: true
    particles:
      auto_off_minutes: 5
      per_tick_cap: 100
      global_toggle_default: true
