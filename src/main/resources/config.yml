    check_interval_hours: 12

# ── Restart system ────────────────────────────────────────────────────────────
restart:
  # Scheduled automatic restart
  schedule:
    enabled: false
    # If use-time is true, restarts daily at the specified wall-clock time (server timezone).
    # If false, restarts every interval-hours after server start.
    use-time: false
    time: "04:00"              # HH:mm — used when use-time: true
    interval-hours: 12         # used when use-time: false
    countdown-seconds: 300     # countdown length before the scheduled restart fires
    reason: "Scheduled restart"

  # /restart command defaults
  default-countdown-seconds: 300   # 5 min when /restart called with no args

  # Message shown in the announce broadcasts
  # Supports § colour codes.
  announce-prefix: "§c§l[SERVER] §r"

  # Message sent to each player when they are kicked on restart
  kick-message: "§cThe server is restarting — be right back! ✦"

  # Notify the web panel on restart events (restart_scheduled / restart_executing / restart_cancelled)
  panel-notify: true

