name: JebaitedCore
main: com.darkniightz.main.JebaitedCore
version: 1.0.0-SNAPSHOT
api-version: 1.21
author: DarkNiightz
description: Jebaited Core Plugin.

commands:
  # Core/help
  jebaited:
    description: Adaptive help for Jebaited Core
    usage: /jebaited
  devmode:
    description: Toggle developer bypass mode (allowed UUIDs only)
    usage: /devmode <on|off|toggle>
  # Ranks & tickets & stats
  rank:
    description: Manage or view player ranks
    usage: /rank <get|set> ...
  setrank:
    description: Sets a player's rank
    usage: /setrank <player> <group>
  tickets:
    description: View or manage cosmetic tickets
    usage: /tickets [player] | /tickets <give|take|set> <player> <amount>
  stats:
    description: View your (or another player's) hub stats
    usage: /stats [player]
  # Moderation suite
  kick:
    description: Kick a player
    usage: /kick <player> [reason]
  warn:
    description: Warn a player
    usage: /warn <player> <reason>
  mute:
    description: Permanently mute a player
    usage: /mute <player> [reason]
  tempmute:
    description: Temporarily mute a player
    usage: /tempmute <player> <duration> [reason]
  unmute:
    description: Unmute a player
    usage: /unmute <player>
  ban:
    description: Permanently ban a player
    usage: /ban <player> [reason]
  tempban:
    description: Temporarily ban a player
    usage: /tempban <player> <duration> [reason]
  unban:
    description: Unban a player
    usage: /unban <player>
  freeze:
    description: Toggle freeze on a player
    usage: /freeze <player>
  vanish:
    description: Toggle staff vanish
    usage: /vanish
  staffchat:
    description: Toggle staff chat or send a message
    usage: /staffchat [message]
  clearchat:
    description: Clear public chat for non-staff
    usage: /clearchat
  slowmode:
    description: Set global chat slowmode
    usage: /slowmode <seconds|off>
  history:
    description: View moderation history for a player
    usage: /history [player]
  # Hub menus
  menu:
    description: Open the Servers Navigator GUI
    usage: /menu
  servers:
    description: Open the Servers Navigator GUI
    usage: /servers
  navigator:
    description: Open the Servers Navigator GUI
    usage: /navigator
  cosmetics:
    description: Open the Wardrobe (cosmetics) GUI
    usage: /cosmetics
  wardrobe:
    description: Open the Wardrobe (cosmetics) GUI
    usage: /wardrobe

permissions:
  jebaited.core.use:
    default: true
  jebaited.menu.use:
    default: true
  jebaited.cosmetics.open:
    default: true