# Supported Paper range: 1.21.9-1.21.11
name: JebaitedCore
main: com.darkniightz.main.JebaitedCore
version: 1.0.0-SNAPSHOT
api-version: 1.21
author: DarkNiightz
description: Jebaited Core Plugin for Paper 1.21.9-1.21.11.

# Load after mcMMO so our /party registration and eviction run last (native party + tab completions).
softdepend: [mcMMO]

libraries:
  - com.zaxxer:HikariCP:5.1.0
  - org.postgresql:postgresql:42.7.3
  - com.stripe:stripe-java:28.0.0

commands:
  # Core/help
  jebaited:
    description: Permission-aware command list for Jebaited Core
    usage: /jebaited
  help:
    description: Permission-aware command list for Jebaited Core
    usage: /help
  devmode:
    description: Toggle developer bypass mode (allowed UUIDs only)
    usage: /devmode <on|off|toggle>
    aliases: [dev]
  # Ranks & coins & stats
  rank:
    description: Manage or view player ranks
    usage: /rank <get|set> ...
  setrank:
    description: Sets a player's rank
    usage: /setrank <player> <group>
  setdonor:
    description: Sets a player's donor rank (admin+)
    usage: /setdonor <player> <rank|none>
  togglerank:
    description: Toggle chat prefix between staff and donor rank
    usage: /togglerank
  stats:
    description: Open the stats GUI
    usage: /stats [player]
  settings:
    description: Open your personal settings menu
    usage: /settings
    aliases: [prefs, preferences]
  coins:
    description: View or manage Cosmetic Coins
    usage: /coins [player] | /coins <give|take|remove|set> <player> <amount>
    aliases: [coin]
  balance:
    description: View your money balance or check another player's balance
    usage: /balance [player]
    aliases: [bal, money]
  pay:
    description: Send money to another online player
    usage: /pay <player> <amount>
  eco:
    description: Administrative economy controls
    usage: /eco <give|take|set> <player> <amount>
  balancetop:
    description: Show the richest players
    usage: /balancetop [limit]
    aliases: [baltop]
  sethome:
    description: Create or update one of your homes
    usage: /sethome [name]
  home:
    description: Teleport to one of your homes
    usage: /home [name]
  delhome:
    description: Delete one of your homes
    usage: /delhome <name>
  homes:
    description: List your homes
    usage: /homes
  nick:
    description: Set or clear player nicknames
    usage: /nick <name|off> or /nick <player> <name|off>
  tag:
    description: Set your customizable cosmetic tag text
    usage: /tag <text with & colors> | /tag clear
  whois:
    description: Show diagnostic player information
    usage: /whois <player>
  near:
    description: List nearby players
    usage: /near [radius]
  rules:
    description: Show server rules
    usage: /rules
  link:
    description: Generate a one-time Discord account link code
    usage: /link
  rtp:
    description: Teleport to a random location in SMP
    usage: /rtp
  shop:
    description: Open the server economy shop (SMP)
    usage: /shop
    aliases: [market]
  donate:
    description: Open the supporter store (Stripe Checkout)
    usage: /donate
    aliases: [store]
  loot:
    description: Open your hardcore event loot pool and claim rewards
    usage: /loot [claim]
  message:
    description: Send a private message to another player
    usage: /message <player> <message>
    aliases: [msg, tell, whisper, w]
  reply:
    description: Reply to the last player who messaged you
    usage: /reply <message>
    aliases: [r]
  maintenance:
    description: Toggle or inspect server maintenance mode
    usage: /maintenance <on|off|status|add|allow|remove|list>
    aliases: [maint]
  notes:
    description: View staff notes for a player
    usage: /notes <player>
  warp:
    description: Teleport to a public warp
    usage: /warp <name>
  warps:
    description: List all public warps
    usage: /warps
  setwarp:
    description: Create or update a public warp
    usage: /setwarp <name> [cost]
  delwarp:
    description: Delete a public warp
    usage: /delwarp <name>
  # Moderation suite
  kick:
    description: Kick a player
    usage: /kick <player> [reason]
  warn:
    description: Warn a player
    usage: /warn <player> <reason>
  mute:
    description: Permanently mute a player
    usage: /mute <player> [reason]
  tempmute:
    description: Temporarily mute a player
    usage: /tempmute <player> <duration> [reason]
  unmute:
    description: Unmute a player
    usage: /unmute <player>
  ban:
    description: Permanently ban a player
    usage: /ban <player> [reason]
  tempban:
    description: Temporarily ban a player
    usage: /tempban <player> <duration> [reason]
  unban:
    description: Unban a player
    usage: /unban <player>
  freeze:
    description: Toggle freeze on a player
    usage: /freeze <player>
  unfreeze:
    description: Force-unfreeze a player
    usage: /unfreeze <player>
  vanish:
    description: Toggle staff vanish
    usage: /vanish
  staffchat:
    description: Toggle staff chat or send a message
    usage: /staffchat [message]
    aliases: [sc]
  clearchat:
    description: Clear public chat for non-staff
    usage: /clearchat
    aliases: [cc]
  slowmode:
    description: Set global chat slowmode
    usage: /slowmode <seconds|off>
    aliases: [sm]
  history:
    description: View moderation history for a player
    usage: /history [player]
  # Hub menus
  menu:
    description: Open the Servers Navigator GUI
    usage: /menu
    aliases: [m]
  servers:
    description: Open the Servers Navigator GUI
    usage: /servers
    aliases: [sv]
  navigator:
    description: Open the Servers Navigator GUI
    usage: /navigator
    aliases: [nav]
  cosmetics:
    description: Open the Cosmetics Lounge
    usage: /cosmetics | /cosmetics <give|take> <id> <player> | /cosmetics wipe <player>
    aliases: [cos]
  wardrobe:
    description: Open the Wardrobe
    usage: /wardrobe
    aliases: [wd]
  spawn:
    description: Return to the configured spawn
    usage: /spawn
  hub:
    description: Return to the hub world
    usage: /hub
  smp:
    description: Travel to the SMP world
    usage: /smp
  trade:
    description: Request or accept a nearby item trade
    usage: "/trade <player> | /trade accept <player> | /trade deny <player>"
  grave:
    description: Track your latest active grave
    usage: /grave
  graves:
    description: List your active graves
    usage: /graves
  back:
    description: Teleport to your last death location (Grandmaster only, one-use)
    usage: /back
  deathtp:
    description: Teleport to your last death location (Legend+ donor perk, one-use)
    usage: /deathtp
    aliases: [dtp]
  feed:
    description: Restore your hunger and saturation to maximum (Diamond+ donor perk)
    usage: /feed
  repair:
    description: Repair the item in your hand, or all items with /repair all (Grandmaster donor perk)
    usage: /repair [all]
  enderchest:
    description: Open your ender chest from anywhere (Gold+ donor perk)
    usage: /enderchest
    aliases: [ec]
  craft:
    description: Open a portable crafting table (Gold+ donor perk)
    usage: /craft
  anvil:
    description: Open a portable anvil (Gold+ donor perk)
    usage: /anvil
  kit:
    description: Claim your donor kit
    usage: /kit [tier]
  worldstatus:
    description: Show world routing and load status
    usage: /worldstatus
  compat:
    description: Show startup, database, and world conversion compatibility status
    usage: /compat
    aliases: [compatreport]
  leaderboard:
    description: Set or remove persistent hologram leaderboards
    usage: "/leaderboard set <category> [id] | /leaderboard remove <id> | /leaderboard list | /leaderboard refresh [id] | /leaderboard debug <id>"
  setspawn:
    description: Set the configured spawn location
    usage: /setspawn
  loadout:
    description: Save, apply, or clear cosmetic loadouts
    usage: /loadout <save|apply|clear|list> [name]
  previewpedestal:
    description: Place or manage the preview pedestal
    usage: /previewpedestal [set|clear|status]
    aliases: [setpreviewpedestal]
  preview:
    description: Preview cosmetics or open the collection browser
    usage: /preview [featured|cosmeticKey]
  event:
    description: Full event control panel command
    usage: /event <status|info|list|join|leave|spectate|start|stop|complete|setreward|arenas|setup>
    aliases: [eventmode]
  chatgame:
    description: Chat mini-games (math, scramble, quiz) parallel to combat events
    usage: /chatgame <status|list|start|stop>
    aliases: [cg]
  generatepassword:
    description: Generate a web panel password for yourself
    usage: /generatepassword
  restart:
    description: Schedule or cancel a server restart with countdown
    usage: /restart [<time>] [<reason...>] | /restart cancel | /restart status
    aliases: [srestart, serverrestart]
  jreload:
    description: Reload JebaitedCore config and refresh DB caches (developers+)
    usage: /jreload
    aliases: [jr]
  debug:
    description: Open the developer debug cockpit
    usage: /debug [menu|system|commands|listeners|cosmetics|preview|actions|events]
    aliases: [devdebug]
  combatlogs:
    description: Show whether you are combat tagged and time remaining
    usage: /combatlogs
    aliases: [combatlog, ctag]
  inspect:
    description: Inspect another player's mcMMO skills (Jebaited wrapper)
    usage: /inspect <player>
    permission: jebaited.mcmmo.inspect
    aliases: [mcinspect, mmoinspect]
  mcrank:
    description: Show mcMMO leaderboard ranks per skill (Jebaited wrapper)
    usage: /mcrank [player]
    permission: jebaited.mcmmo.mcrank
  mcstats:
    description: Show mcMMO skill levels and power (Jebaited wrapper; does not use the mcstats stats alias)
    usage: /mcstats [player]
    permission: jebaited.mcmmo.mcstats
  mctop:
    description: Show mcMMO leaderboards (Jebaited wrapper)
    usage: /mctop [skill|page] [page]
    permission: jebaited.mcmmo.mctop
  party:
    description: Party management
    usage: /party <create|invite|join|accept|deny|kick|leave|disband|transfer|chat|list|warp|setwarp|clearwarp|open|ff|gui>
    aliases: [pa]
  p:
    description: Send a message to your party chat
    usage: /p <message>
  friend:
    description: Friend management
    usage: /friend <add|remove|accept|deny|list|pending|info|gui>
    aliases: [f]
  friends:
    description: Open your friends list
    usage: /friends
    aliases: [fl]
  pv:
    description: Open your private vault
    usage: /pv [page]
    aliases: [vault]
  achievements:
    description: View your achievement progress
    usage: /achievements [player]
    aliases: [ach, achieve]

permissions:
  # ── Core ──────────────────────────────────────────────
  jebaited.core.use:
    description: Base plugin access
    default: true
  jebaited.achievements.use:
    description: View own achievements
    default: true
  jebaited.chatgame.use:
    description: Optional permission for chat game staff actions (rank gate is primary)
    default: false
  jebaited.combatlog.use:
    description: View own combat tag status
    default: true
  jebaited.mcmmo.mcstats:
    description: Use /mcstats (mcMMO stats wrapper)
    default: true
  jebaited.mcmmo.mcstats.others:
    description: View another player's mcMMO stats via /mcstats
    default: false
  jebaited.mcmmo.mctop:
    description: Use /mctop (mcMMO leaderboard wrapper)
    default: true
  jebaited.mcmmo.inspect:
    description: Use /inspect (mcMMO inspect wrapper)
    default: true
  jebaited.mcmmo.mcrank:
    description: Use /mcrank (mcMMO rank wrapper)
    default: true
  jebaited.shop.use:
    description: Open the server economy shop GUI
    default: true
  jebaited.donate.use:
    description: Open the Stripe supporter store (/donate)
    default: true
  jebaited.loot.use:
    description: Open and claim hardcore event loot pool rewards
    default: true
  jebaited.discord.link:
    description: Generate one-time Discord linking codes
    default: true
  jebaited.discord.bridge.faction:
    description: Use faction Discord↔MC chat relay when enabled in config
    default: false
  jebaited.tablist.hide:
    description: Use compact tablist footer mode (staff utility)
    default: false
  jebaited.menu.use:
    description: Open the Servers Navigator GUI
    default: true
  jebaited.cosmetics.open:
    description: Open the Wardrobe cosmetics GUI
    default: true
  jebaited.reload:
    description: Reload JebaitedCore config (developer+)
    default: op

  # ── Moderation (match web-panel permission keys) ──────
  jebaited.mod.kick:
    description: Kick players (helper+)
    default: false
  jebaited.mod.warn:
    description: Warn players (helper+)
    default: false
  jebaited.mod.tempmute:
    description: Temporarily mute players (moderator+)
    default: false
  jebaited.mod.tempban:
    description: Temporarily ban players (helper+)
    default: false
  jebaited.mod.mute:
    description: Permanently mute players (moderator+)
    default: false
  jebaited.mod.ban:
    description: Permanently ban players (moderator+)
    default: false
  jebaited.mod.unban:
    description: Unban players (moderator+)
    default: false
  jebaited.mod.unmute:
    description: Unmute players (moderator+)
    default: false
  jebaited.mod.freeze:
    description: Freeze/unfreeze players (moderator+)
    default: false
  jebaited.mod.vanish:
    description: Toggle vanish mode (helper+)
    default: false
  jebaited.mod.staffchat:
    description: Use staff chat (helper+)
    default: false
  jebaited.mod.clearchat:
    description: Clear public chat (helper+)
    default: false
  jebaited.mod.slowmode:
    description: Set chat slowmode (moderator+)
    default: false
  jebaited.mod.history:
    description: View moderation history (helper+)
    default: false

  # ── Ranks ─────────────────────────────────────────────
  jebaited.rank.set:
    description: Directly set player ranks (must outrank target)
    default: false
  jebaited.rank.view:
    description: View player rank info
    default: true
