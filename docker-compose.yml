# =============================================================================
# CANONICAL DOCKER STACK: ../../../JebaitedNetwork/docker-compose.yml
#   Project name: jebaitednetwork
#
# This file only *includes* that stack so you can run `docker compose` from the
# plugin repo. Same file is also included by:
#   Vibe Code/MC Server/docker-compose.yml  (convenience alias — not a second stack)
#
# Do NOT add a second Postgres/Paper/Redis stack here — it duplicates ports.
#
# Start the stack (pick one working directory):
#   cd "...\Vibe Code\JebaitedNetwork"
#   docker compose up -d --build
#
# Deploy JebaitedCore.jar to the hub Paper data dir (bind-mounted by mc-hub):
#   Vibe Code\MC Server\plugins\JebaitedCore.jar
# Or: Vibe Code\scripts\build-jebaitedcore-docker.ps1  (defaults to MC Server\plugins)
#
# Details: docs/DOCKER.md
# =============================================================================
# Force the same Compose project name as when you run from JebaitedNetwork/
# (avoids a second parallel stack named after this folder).
name: jebaitednetwork
include:
  - path: "../../../JebaitedNetwork/docker-compose.yml"
